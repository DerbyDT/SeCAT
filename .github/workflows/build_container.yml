name: Build and Push Container

on:
  push:
    branches:
      - main
    paths:
      - 'containers/Dockerfile'
      - 'containers/secat.def'
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          TAGS="ghcr.io/derbydt/secat:latest"
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
            TAGS="$TAGS,ghcr.io/derbydt/secat:${VERSION}"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker pull ghcr.io/derbydt/secat:latest
          docker run --rm ghcr.io/derbydt/secat:latest \
              Rscript -e "library(DECIPHER); library(vegan); cat('Packages OK\n')"
          docker run --rm ghcr.io/derbydt/secat:latest vsearch --version
